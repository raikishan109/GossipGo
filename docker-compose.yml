services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/gossipgo
      REDIS_URL: redis://redis:6379
      USERPANEL_URL: http://localhost:3000
      ADMINPANEL_URL: http://localhost:3001
      BOOTSTRAP_ADMIN_ON_STARTUP: "${BOOTSTRAP_ADMIN_ON_STARTUP:-false}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-}"
      JWT_SECRET: replace-with-a-long-random-secret
      JWT_EXPIRES_IN: 7d
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 200
      AUTH_RATE_LIMIT_MAX: 20
      GUEST_MODE_ENABLED: "true"
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: frontend/user-panel/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    ports:
      - "3000:3000"

  admin:
    build:
      context: .
      dockerfile: frontend/admin-panel/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3001:3001"

volumes:
  mongo_data:
